<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Petualangan Mariolpg</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: 'Fredoka One', cursive, sans-serif; touch-action: none; }

        /* --- NOTIFIKASI LANDSCAPE --- */
        #landscape-warning {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #e52521; color: #fff; z-index: 10000;
            display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box;
        }
        .phone-icon { font-size: 80px; margin-bottom: 20px; animation: rotatePhone 2s infinite ease-in-out; }
        @keyframes rotatePhone { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } 100% { transform: rotate(0deg); } }
        @media screen and (max-width: 768px) and (orientation: portrait) { #landscape-warning { display: flex; } #game-wrapper { display: none !important; } }

        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #5c94fc; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }

        /* --- UI OVERLAYS --- */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(92, 148, 252, 0.95); z-index: 100; }
        .hidden { display: none !important; }

        #login-menu, #main-menu { background-image: url('https://imgur.com/9JiaKHG.png'); background-repeat: no-repeat; background-position: center center; background-size: cover; background-color: #5c94fc; }
        .login-box { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 400px; border: 5px solid #fbd000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
        .login-box h2 { color: #e52521; margin-top: 0; font-size: 28px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 14px; color: #333; margin-bottom: 5px; font-family: sans-serif; font-weight: bold;}
        .input-field { width: 100%; padding: 12px; border: 3px solid #ccc; border-radius: 10px; font-size: 16px; font-family: sans-serif; box-sizing: border-box; outline: none; }
        .input-field:focus { border-color: #4caf50; }
        #login-error { color: #e52521; font-family: sans-serif; font-size: 14px; margin-bottom: 15px; display: none; font-weight: bold;}

        #title-img { max-width: 80%; height: auto; margin-top: 5vh; margin-bottom: 0px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); animation: float 3s ease-in-out infinite; position: relative; z-index: 1; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
        .small-title { font-size: 32px; color: #FFFF00; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 0 15px rgba(255, 255, 255, 1); margin-top: -10px; margin-bottom: 25px; letter-spacing: 2px; text-align: center; position: relative; z-index: 2; }
        .menu-buttons { display: flex; flex-direction: column; gap: 15px; position: relative; z-index: 2; }
        .btn { background: #e52521; color: white; border: 4px solid #fff; padding: 15px 30px; font-size: 20px; font-family: 'Fredoka One', cursive; border-radius: 30px; cursor: pointer; box-shadow: 0 5px 0 #8a0000; transition: transform 0.1s; width: 100%; box-sizing: border-box; text-align: center; }
        .btn:active { transform: translateY(5px); box-shadow: 0 0 0 #8a0000; }
        .btn-blue { background: #2196F3; box-shadow: 0 5px 0 #0b7dda; }

        /* HUD */
        #hud { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; z-index: 50; }
        .stats { background: rgba(0, 0, 0, 0.6); color: white; padding: 10px 20px; border-radius: 15px; font-size: 20px; border: 2px solid #fff; pointer-events: auto; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;}
        .top-buttons { display: flex; gap: 10px; pointer-events: auto; flex-wrap: wrap; justify-content: flex-end;}
        .hud-btn { background: #fbd000; color: #d13a00; border: 3px solid #fff; padding: 10px; font-size: 16px; font-family: inherit; border-radius: 15px; cursor: pointer; box-shadow: 0 4px 0 #c28700; white-space: nowrap;}
        .hud-btn.active-bgm { background: #4caf50; color: white; border-color: white; box-shadow: 0 4px 0 #2e7d32; }

        /* TOUCH CONTROLS */
        #touch-controls { position: absolute; bottom: 30px; left: 0; width: 100%; height: 120px; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; pointer-events: none; z-index: 50; }
        .touch-group { display: flex; gap: 8px; align-items: flex-end; pointer-events: auto; }
        .t-btn { width: 65px; height: 65px; background: rgba(255, 255, 255, 0.5); border: 4px solid rgba(255, 255, 255, 0.9); border-radius: 50%; color: #333; font-size: 13px; font-weight: bold; display: flex; justify-content: center; align-items: center; user-select: none; cursor: pointer; }
        .t-btn:active, .t-btn.active { background: rgba(255, 255, 255, 0.9); transform: scale(0.95); }
        .t-btn-jump { width: 80px; height: 80px; background: rgba(229, 37, 33, 0.7); color: white; font-size: 15px; }

        /* MODALS (KUIS & LIBRARY) */
        #quiz-modal, #library-modal { background: rgba(0, 0, 0, 0.85); }
        .quiz-box, .library-box { background: #fff; padding: 25px; border-radius: 20px; text-align: center; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; border: 5px solid #fbd000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-family: sans-serif; }
        .library-box { border-color: #4caf50; }
        .quiz-box h2, .library-box h2 { color: #e52521; margin-top: 0; font-size: 24px; font-family: 'Fredoka One', cursive;}
        
        /* Quiz Elements */
        .q-btn { background: #4caf50; color: white; border: none; padding: 12px; font-size: 16px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; transition: background 0.2s;}
        .q-btn:hover { background: #388e3c; }
        .word-bank { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 15px; padding: 15px; background: #f0f0f0; border-radius: 10px;}
        .word-chip { background: #2196F3; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; user-select: none; box-shadow: 0 3px 0 #0b7dda; }
        .word-chip:active { transform: translateY(3px); box-shadow: 0 0 0; }
        .answer-area { min-height: 50px; border: 3px dashed #ccc; border-radius: 10px; padding: 10px; margin-top: 15px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; background: #fafafa;}
        .blank-slot { display: inline-block; min-width: 100px; height: 30px; border-bottom: 3px solid #333; margin: 0 5px; text-align: center; color: #e52521; font-weight: bold; cursor: pointer; background: #ffebee;}

        /* Papan Skor */
        #leaderboard-menu { background: rgba(0,0,0,0.9); color: white;}
        .lb-list { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; width: 90%; max-width: 500px; height: 300px; overflow-y: auto; font-family: sans-serif; margin-bottom: 20px; }
        .lb-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .lb-rank { font-weight: bold; color: #fbd000; width: 30px; font-size: 18px;}
        .lb-name { flex-grow: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 16px;}
        .lb-school { font-size: 12px; color: #aaa; display: block; }
        .lb-pts { font-weight: bold; color: #4caf50; font-size: 18px;}
        .loading-text { text-align: center; font-style: italic; color: #ccc; }

        #message-overlay { background: rgba(0,0,0,0.8); color: white; }
        #message-text { font-size: 32px; text-align: center; text-shadow: 3px 3px 0 #000; margin-bottom: 30px;}
    </style>
</head>
<body>

<div id="landscape-warning">
    <div class="rotate-icon">📱↻</div>
    <h1>Putar HP Kamu!</h1>
    <p>Game ini wajib dimainkan dalam mode mendatar (Landscape) agar seru!</p>
</div>

<div id="game-wrapper" style="width:100%; height:100%;">
<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <!-- UI Menus -->
    <div id="login-menu" class="overlay">
        <div class="login-box">
            <h2>Masuk Dulu Yuk!</h2>
            <div id="login-error">Nama dan Sekolah harus diisi!</div>
            <div class="input-group"><label>Nama Kamu:</label><input type="text" id="player-name" class="input-field" autocomplete="off"></div>
            <div class="input-group"><label>Asal Sekolah:</label><input type="text" id="player-school" class="input-field" autocomplete="off"></div>
            <button class="btn btn-blue" id="login-submit-btn">Mulai Petualangan</button>
        </div>
    </div>

    <div id="main-menu" class="overlay hidden">
        <img id="title-img" src="https://imgur.com/VmSLsxs.png" alt="Petualangan Mariolpg">
        <h1 class="small-title">Halo, <span id="welcome-name">Sobat</span>!</h1>
        <div class="menu-buttons">
            <button class="btn" id="start-btn">MAIN SEKARANG</button>
            <button class="btn btn-blue" id="leaderboard-btn">🏆 PAPAN SKOR</button>
        </div>
    </div>

    <div id="leaderboard-menu" class="overlay hidden">
        <h2 style="color:#fbd000; font-family:'Fredoka One'; font-size:32px;">🏆 Peringkat Teratas 🏆</h2>
        <div class="lb-list" id="lb-content">
            <div class="loading-text">Memuat data dari server...</div>
        </div>
        <button class="btn" id="close-lb-btn" style="max-width:200px;">Kembali</button>
    </div>

    <div id="hud" class="hidden">
        <div class="stats" style="position:relative;">
            ❤️ <span id="ui-lives">3</span> <span style="color:#aaa;">|</span> 
            💰 <span class="coin-icon"></span> <span id="ui-score">0</span> <span style="color:#aaa;">|</span> 
            🚩 Lv <span id="ui-level">1</span>
            <div id="powerup-bar"></div>
        </div>
        <div class="top-buttons">
            <button id="fullscreen-btn" class="hud-btn">⛶</button>
            <button id="bgm-btn" class="hud-btn active-bgm">🎵</button>
            <button id="menu-btn" class="hud-btn">Menu Utama</button>
        </div>
    </div>

    <div id="touch-controls" class="hidden">
        <div class="touch-group">
            <div class="t-btn" id="t-left">Kiri</div><div class="t-btn" id="t-right">Kanan</div>
        </div>
        <div class="touch-group"><div class="t-btn" id="t-down" style="height: 55px;">Nunduk</div><div class="t-btn t-btn-jump" id="t-jump">Lompat</div></div>
    </div>

    <!-- Modal Kuis Terpadu -->
    <div id="quiz-modal" class="overlay hidden">
        <div class="quiz-box">
            <h2>Kuis Level <span id="qz-lvl-text"></span></h2>
            <p id="quiz-question" style="font-size: 18px; color:#333; margin-bottom: 15px; font-weight:bold;"></p>
            
            <!-- Area Interaktif bergantung tipe kuis -->
            <div id="quiz-interactive-area"></div>

            <button class="btn btn-blue hidden" id="quiz-submit-btn" style="margin-top:20px;">Cek Jawaban</button>
        </div>
    </div>

    <!-- Modal Perpustakaan -->
    <div id="library-modal" class="overlay hidden">
        <div class="library-box">
            <h2>📚 Ruang Baca: "Puasa"</h2>
            <div id="lib-content-area" style="background:#f9f9f9; padding:15px; border-radius:10px; text-align:left; min-height:150px;"></div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                <button id="lib-prev" class="btn btn-blue" style="padding:10px 15px; width:auto;">&laquo; Prev</button>
                <span id="lib-page-indicator" style="font-weight:bold;">1 / 7</span>
                <button id="lib-next" class="btn btn-blue" style="padding:10px 15px; width:auto;">Next &raquo;</button>
            </div>
            <button class="btn" id="lib-close" style="margin-top:20px;">Selesai Belajar</button>
        </div>
    </div>

    <div id="message-overlay" class="overlay hidden">
        <h1 id="message-text">Game Over</h1>
        <button class="btn" id="msg-btn" style="max-width:200px;">Kembali</button>
    </div>
</div>
</div>

/** KONFIGURASI GLOBAL */

let gameState = 'login', requestID;
let currentPlayer = { name: '', school: '' };
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas); resizeCanvas(); 

let score = 0, lives = 3, currentLevel = 1;
const TILE_SIZE = 40, GRAVITY = 0.6, FRICTION = 0.8;

/** ASSETS GAMBAR PENGGANTI IMGUR (Draw Canvas untuk Landak) */
const assets = { player: new Image(), flag: new Image() };
assets.player.src = "https://imgur.com/z6sD9iS.png";

/** AUDIO SYSTEM */
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

function playSound(type) {
    if (!audioCtx || !bgmEnabled) return;
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain(), now = audioCtx.currentTime;
    osc.connect(gain); gain.connect(audioCtx.destination);
    
    if (type === 'jump') { osc.type = 'square'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(600, now + 0.2); gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.2); osc.start(now); osc.stop(now + 0.2); } 
    else if (type === 'coin') { osc.type = 'square'; osc.frequency.setValueAtTime(987, now); osc.frequency.setValueAtTime(1318, now + 0.08); gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.3); osc.start(now); osc.stop(now + 0.3); } 
    else if (type === 'bump') { osc.type = 'square'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.1); gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.1); osc.start(now); osc.stop(now + 0.1); } 
    else if (type === 'powerup') { osc.type = 'square'; osc.frequency.setValueAtTime(300, now); osc.frequency.linearRampToValueAtTime(1000, now + 0.4); gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0, now + 0.4); osc.start(now); osc.stop(now + 0.4); } 
    else if (type === 'dead') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, now); osc.frequency.linearRampToValueAtTime(100, now + 0.8); gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 1.0); osc.start(now); osc.stop(now + 1.0); }
    else if (type === 'pipe') { osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.linearRampToValueAtTime(200, now + 0.6); gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.6); osc.start(now); osc.stop(now + 0.6); }
}

let bgmEnabled = true, isBgmPlaying = false, nextNoteTime = 0, bgmStep = 0, bgmReqId;
const marioMelody = [ 659,0,659,0,0,659,0,523,659,0,784,0,0,0,392,0,0,0,523,0,0,392,0,0,329,0,0,440,0,493,0,466,440,0,392,659,784,880,0,698,784,0,659,0,523,587,493,0,0,0 ];
function scheduleBGM() {
    if (!isBgmPlaying || !audioCtx || !bgmEnabled) return;
    while (nextNoteTime < audioCtx.currentTime + 0.1) {
        let freq = marioMelody[bgmStep];
        if (freq > 0) {
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain(); osc.type = 'square'; osc.frequency.value = freq; osc.connect(gain); gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.015, nextNoteTime); gain.gain.setTargetAtTime(0, nextNoteTime + 0.05, 0.015); osc.start(nextNoteTime); osc.stop(nextNoteTime + 0.15);
        }
        nextNoteTime += 0.15; bgmStep = (bgmStep + 1) % marioMelody.length;
    }
    bgmReqId = requestAnimationFrame(scheduleBGM);
}
function startBGM() { if(bgmEnabled && !isBgmPlaying) { initAudio(); isBgmPlaying = true; nextNoteTime = audioCtx.currentTime + 0.1; bgmStep = 0; scheduleBGM(); } }
function stopBGM() { isBgmPlaying = false; cancelAnimationFrame(bgmReqId); }

document.getElementById('bgm-btn').addEventListener('click', function() {
    bgmEnabled = !bgmEnabled;
    if(bgmEnabled) { this.classList.add('active-bgm'); this.innerText = '🎵'; this.style.background = '#4caf50'; this.style.color = '#fff'; startBGM(); } 
    else { this.classList.remove('active-bgm'); this.innerText = '🔇'; this.style.background = '#e52521'; this.style.color = '#fff'; stopBGM(); }
});

        "GGGGGGGGGGGG  GGGGGGGGGGGGGG   GGGGGGGGGGGGGGGGGGGGGGGGGGG   GGGGGGGGGGGGGGGGGGGGGGG ",

        "                                                                                     ",

];

let mapTiles = [], mapWidth = 0, mapHeight = 0, specialPoints = {};
let clouds = [], birds = [], decorations = [], enemies = [], particles = [], items = [];

const player = {
    x: 50, y: 100, originalHeight: 48, crouchHeight: 24, width: 48, height: 48,
    vx: 0, vy: 0, speed: 5, jumpPower: 10, grounded: false, facingLeft: false, runFrame: 0, invincibleTimer: 0, finishedLevel: false, isJumping: false, jumpHoldTimer: 0, isCrouching: false, isBig: false, pipeState: null, pipeTimer: 0, pipeTargetType: null,
    reset: function() { this.x = 50; this.y = 100; this.vx = 0; this.vy = 0; this.isBig = false; this.originalHeight = 48; this.crouchHeight = 24; this.height = this.originalHeight; this.isCrouching = false; this.invincibleTimer = 0; this.finishedLevel = false; this.isJumping = false; this.jumpHoldTimer = 0; this.pipeState = null; camera.x = 0; camera.y = 0; },
    makeBig: function() { if (!this.isBig) { this.isBig = true; this.y -= 24; this.originalHeight = 72; this.height = this.originalHeight; this.crouchHeight = 36; spawnParticles(this.x + this.width/2, this.y + this.height/2, '#fff'); spawnFloatingText("POWER UP!", this.x, this.y-30); } },
    shrink: function() { if (this.isBig) { this.isBig = false; this.originalHeight = 48; this.height = this.originalHeight; this.crouchHeight = 24; this.y += 24; this.invincibleTimer = 2; playSound('pipe'); spawnParticles(this.x + this.width/2, this.y + this.height/2, '#ddd'); } },
    update: function() {
        if(this.finishedLevel || this.pipeState) return;

        // Cek Pipa
        if (keys.down && this.grounded && !this.isCrouching && Math.abs(this.vx) < 1) {
            let centerCol = Math.floor((this.x + this.width / 2) / TILE_SIZE), bottomRow = Math.floor((this.y + this.height + 2) / TILE_SIZE);
            if (bottomRow < mapTiles.length && mapTiles[bottomRow]) {
                let tile = mapTiles[bottomRow][centerCol];
                if (tile && (tile.type === 10 || tile.type === 15)) {
                    this.x = centerCol * TILE_SIZE + (TILE_SIZE - this.width) / 2;
                    if (tile.type === 15) { this.pipeState = 'entering_library'; } 
                    else { this.pipeState = 'entering'; this.pipeTargetType = 'U'; }
                    this.pipeTimer = 0; gameState = 'pipe_transition'; playSound('pipe'); return; 
                }
            }
        }

        // Cek Pipa Masuk (P atau O)
        if (keys.down && this.grounded && !this.isCrouching && Math.abs(this.vx) < 1) {
            let centerCol = Math.floor((this.x + this.width / 2) / TILE_SIZE);
            let bottomRow = Math.floor((this.y + this.height + 2) / TILE_SIZE);
            if (bottomRow < mapTiles.length && mapTiles[bottomRow]) {
                let tile = mapTiles[bottomRow][centerCol];
                if (tile && (tile.type === 10 || tile.type === 13)) {
                    this.x = centerCol * TILE_SIZE + (TILE_SIZE - this.width) / 2; // Rata tengah
                    this.pipeState = 'entering';
                    this.pipeTargetType = tile.type === 10 ? 'U' : 'X';
                    this.pipeTimer = 0;
                    gameState = 'pipe_transition';
                    playSound('pipe');
                    return; 
                }
            }
        }
		
		// Cek Pipa Samping (Keluar dari Bawah Tanah)
        if(keys.right && this.grounded) {
            let rightCol = Math.floor((this.x + this.width + 2) / TILE_SIZE), midRow = Math.floor((this.y + this.height/2) / TILE_SIZE);
            if(mapTiles[midRow] && mapTiles[midRow][rightCol] && mapTiles[midRow][rightCol].type === 13) {
                 this.pipeState = 'entering_side'; this.pipeTargetType = 'X'; this.pipeTimer = 0; gameState = 'pipe_transition'; playSound('pipe'); return;
            }
        }

        let wantsToCrouch = keys.down && this.grounded;
        if (wantsToCrouch && !this.isCrouching) { this.isCrouching = true; this.height = this.crouchHeight; this.y += (this.originalHeight - this.crouchHeight); } 
        else if (!keys.down && this.isCrouching) {
            let canStand = true; let leftCol = Math.floor((this.x + 8) / TILE_SIZE), rightCol = Math.floor((this.x + this.width - 9) / TILE_SIZE);
            let topRow = Math.floor((this.y - (this.originalHeight - this.crouchHeight)) / TILE_SIZE);
            if (topRow >= 0 && topRow < mapTiles.length) { for (let c = leftCol; c <= rightCol; c++) { if (c < mapWidth && isSolid(mapTiles[topRow][c]?.type)) canStand = false; } }
            if (canStand) { this.isCrouching = false; this.height = this.originalHeight; this.y -= (this.originalHeight - this.crouchHeight); }
        }

        let currentMaxSpeed = this.isCrouching ? this.speed * 0.4 : this.speed;
        if (keys.right) { this.vx += 0.25; this.facingLeft = false; } else if (keys.left) { this.vx -= 0.25; this.facingLeft = true; }
        if (this.vx > currentMaxSpeed) this.vx -= 0.15; if (this.vx < -currentMaxSpeed) this.vx += 0.15;
        if (this.vx > this.speed) this.vx = this.speed; if (this.vx < -this.speed) this.vx = -this.speed;
        if (!keys.left && !keys.right) { this.vx *= FRICTION; if (Math.abs(this.vx) < 0.1) this.vx = 0; }

        if (keys.jump && this.grounded && !this.isJumping) {
            let speedRatio = Math.abs(this.vx) / this.speed, momentumBonus = Math.pow(speedRatio, 2) * 5; 
            let baseJump = this.isCrouching ? this.jumpPower * 0.8 : this.jumpPower;
            this.vy = -(baseJump + momentumBonus); this.grounded = false; this.isJumping = true; this.jumpHoldTimer = 12; playSound('jump');
        }
        if (keys.jump && this.isJumping && this.jumpHoldTimer > 0) { this.vy -= 0.25; this.jumpHoldTimer--; }
        if (!keys.jump) { this.isJumping = false; this.jumpHoldTimer = 0; }

        this.vy += GRAVITY; this.x += this.vx; checkCollisions(true); this.y += this.vy; this.grounded = false; checkCollisions(false); 
        if (this.grounded) { if (!this.isCrouching && Math.abs(this.vx) > 0.5) this.runFrame += Math.abs(this.vx) * 0.05; else this.runFrame = 0; }
        if (this.invincibleTimer > 0) this.invincibleTimer -= 1/60;

        let targetCamX = this.x - canvas.width / 2.5;
        if (targetCamX < 0) targetCamX = 0; if (targetCamX > mapWidth * TILE_SIZE - canvas.width) targetCamX = mapWidth * TILE_SIZE - canvas.width;
        camera.x += (targetCamX - camera.x) * 0.1;
        let targetCamY = this.y - canvas.height / 1.5; 
        if (targetCamY < 0) targetCamY = 0; if (targetCamY > mapHeight - canvas.height) targetCamY = mapHeight - canvas.height;
        camera.y += (targetCamY - camera.y) * 0.1;

        if (this.y > mapHeight + 100) handleDeath();
        if (this.x > (mapWidth - 3) * TILE_SIZE && !this.finishedLevel) { this.finishedLevel = true; this.vx = 0; handleLevelComplete(); }
    },
    draw: function(ctx) {
        if (!assets.player.complete || assets.player.naturalWidth === 0) return;
        ctx.save(); ctx.translate(this.x - camera.x + this.width / 2, this.y - camera.y + this.height / 2);
        if (this.invincibleTimer > 0) { ctx.globalAlpha = Math.sin(Date.now() / 50) * 0.5 + 0.5; ctx.filter = `hue-rotate(${Date.now() % 360}deg)`; }
        if (this.facingLeft) ctx.scale(-1, 1);
        let tiltAngle = 0, scaleY = 1;
        if (this.grounded && Math.abs(this.vx) > 0.5 && !this.isCrouching) {
            tiltAngle = Math.sin(this.runFrame) * 0.25; scaleY = 1 - Math.abs(Math.sin(this.runFrame * 2)) * 0.08;
            ctx.rotate(tiltAngle); ctx.scale(1, scaleY); ctx.translate(0, (1 - scaleY) * this.height / 2); 
        } else if (!this.grounded && !this.isCrouching) { tiltAngle = this.facingLeft ? 0.1 : -0.1; ctx.rotate(tiltAngle); }
        ctx.drawImage(assets.player, -this.width / 2, -this.height / 2, this.width, this.height);
        ctx.restore();
    }
};

const isSolid = (t) => (t >= 1 && t <= 5) || (t === 7) || t === 9 || (t >= 10 && t <= 16);

function initLevel() {
    let currentMapData = maps[currentLevel - 1] || maps[0]; 
    mapTiles = []; mapWidth = currentMapData[0].length; mapHeight = currentMapData.length * TILE_SIZE;
    specialPoints = {}; decorations = []; enemies = []; items = []; particles = []; clouds = []; birds = [];
    
    for(let i=0; i<6; i++) birds.push({ x: Math.random()*mapWidth*TILE_SIZE, y: Math.random()*150, vx: 1+Math.random()*1.5 });
    for(let i=0; i<20; i++) clouds.push({ x: Math.random()*(mapWidth*TILE_SIZE), y: Math.random()*150, size: 30+Math.random()*50, speed: 0.2+Math.random()*0.5 });

    for (let row = 0; row < currentMapData.length; row++) {
        let tileRow = [];
        for (let col = 0; col < mapWidth; col++) {
            let char = currentMapData[row][col], type = 0;
            if (char === 'G') type = 1; else if (char === 'B') type = 2; else if (char === '?') type = 3; 
            else if (char === 'Q') type = 4; else if (char === 'S') type = 5; else if (char === '|') type = 6;
            else if (char === 'M') type = 7; else if (char === 'P') type = 10; else if (char === 'p') type = 11;
            else if (char === 'O') type = 13; else if (char === 'X') { type = 14; specialPoints['X'] = {x: col*TILE_SIZE, y: row*TILE_SIZE}; }
            else if (char === 'L') type = 15; else if (char === 'l') type = 16; 
			else if (char === 'U') { specialPoints['U'] = { x: col*TILE_SIZE, y: row*TILE_SIZE }; }
            else if (char === 'T') decorations.push({ type: 'tree', x: col*TILE_SIZE, y: row*TILE_SIZE });
            else if (char === 'F') decorations.push({ type: 'flag', x: col*TILE_SIZE, y: row*TILE_SIZE });
			else if (char === 'R') decorations.push({ type: 'grass', x: col*TILE_SIZE, y: row*TILE_SIZE });
            else if (char === 'E') { enemies.push({ x: col*TILE_SIZE, y: row*TILE_SIZE + 16, width: 32, height: 24, vx: -1, dead: false, deadTimer: 0 }); }
            tileRow.push({ type: type, hit: false, bumpY: 0 });
        }
        mapTiles.push(tileRow);
    }
    player.reset(); document.getElementById('ui-level').innerText = currentLevel;
}

function updatePipeTransition() {
    if (player.pipeState === 'entering' || player.pipeState === 'entering_library') {
        player.y += 2.5; player.pipeTimer++;
        if (player.pipeTimer > 30) {
            if(player.pipeState === 'entering_library') { openLibrary(); return; }
            let target = specialPoints[player.pipeTargetType];
            if (target) { player.x = target.x + (TILE_SIZE - player.width) / 2; player.y = target.y; gameState = 'playing'; player.pipeState = null; camera.y = player.y - canvas.height / 2; } 
            else { gameState = 'playing'; player.pipeState = null; }
        }
    } else if (player.pipeState === 'entering_side') {
        player.x += 2.5; player.pipeTimer++;
        if (player.pipeTimer > 30) {
            let target = specialPoints[player.pipeTargetType];
            if (target) { player.x = target.x + (TILE_SIZE - player.width) / 2; player.y = target.y + TILE_SIZE; player.pipeState = 'exiting'; player.pipeTimer = 0; camera.y = player.y - canvas.height / 2; }
            else { gameState = 'playing'; player.pipeState = null; }
        }
    } else if (player.pipeState === 'exiting' || player.pipeState === 'exiting_library') {
        player.y -= 2.5; player.pipeTimer++;
        if (player.pipeTimer > 30) { gameState = 'playing'; player.pipeState = null; }
    }
}

function updateEnemies() {
    enemies.forEach(en => {
        if (en.dead) { en.deadTimer--; return; }
        en.vy = (en.vy || 0) + GRAVITY; en.x += en.vx;

        let leftCol = Math.floor(en.x / TILE_SIZE), rightCol = Math.floor((en.x + en.width) / TILE_SIZE);
        let topRow = Math.floor(en.y / TILE_SIZE), bottomRow = Math.floor((en.y + en.height - 1) / TILE_SIZE);
        let hitWall = false;
        // Cek Tembok
        for(let r=topRow; r<=bottomRow; r++) {
            if(r<mapTiles.length && en.vx<0 && isSolid(mapTiles[r][leftCol]?.type)) hitWall = true;
            if(r<mapTiles.length && en.vx>0 && isSolid(mapTiles[r][rightCol]?.type)) hitWall = true;
        }
        // Cek Ujung Jurang
        let nextBottomRow = Math.floor((en.y + en.height + 2) / TILE_SIZE);
        let checkCol = en.vx > 0 ? rightCol : leftCol;
        if(nextBottomRow < mapTiles.length && (!mapTiles[nextBottomRow][checkCol] || !isSolid(mapTiles[nextBottomRow][checkCol].type))) { hitWall = true; }

        if (hitWall) { en.vx *= -1; en.x += en.vx * 2; }
        
        en.y += en.vy; bottomRow = Math.floor((en.y + en.height) / TILE_SIZE);
        for(let c=Math.floor(en.x/TILE_SIZE); c<=Math.floor((en.x+en.width)/TILE_SIZE); c++) {
            if(bottomRow < mapTiles.length && isSolid(mapTiles[bottomRow][c]?.type)) { en.y = bottomRow * TILE_SIZE - en.height; en.vy = 0; }
        }

        // Tabrakan dgn Mario
        if (Math.abs((player.x + player.width/2) - (en.x + en.width/2)) < (player.width/2 + en.width/2 - 5) && Math.abs((player.y + player.height/2) - (en.y + en.height/2)) < (player.height/2 + en.height/2 - 5)) {
            if (player.vy > 0 && player.y + player.height < en.y + en.height / 2 + 15) {
                en.dead = true; en.deadTimer = 30; player.vy = -8; playSound('bump'); addScore(20); spawnFloatingText("+20", en.x, en.y); spawnParticles(en.x + en.width/2, en.y + en.height/2, '#795548');
            } else if (player.invincibleTimer <= 0 && !player.pipeState) { 
                if (player.isBig) { player.shrink(); } else { handleDeath(); }
            }
        }
    });
    enemies = enemies.filter(en => en.deadTimer >= 0);
}

function checkCollisions(isX) {
    const marginX = 8; 
    let leftCol = Math.floor((player.x + marginX) / TILE_SIZE), rightCol = Math.floor((player.x + player.width - marginX - 1) / TILE_SIZE);
    let topRow = Math.floor(player.y / TILE_SIZE), bottomRow = Math.floor((player.y + player.height - 1) / TILE_SIZE);
    if (player.x < 0) { player.x = 0; player.vx = 0; }
    for (let r = topRow; r <= bottomRow; r++) {
        for (let c = leftCol; c <= rightCol; c++) {
            if (r >= 0 && r < mapTiles.length && c >= 0 && c < mapWidth) {
                let tile = mapTiles[r][c];
                if (isSolid(tile.type)) { 
                    if (isX) { if (player.vx > 0) player.x = c * TILE_SIZE - player.width + marginX; else if (player.vx < 0) player.x = (c + 1) * TILE_SIZE - marginX; player.vx = 0; } 
                    else { if (player.vy > 0) { player.y = r * TILE_SIZE - player.height; player.grounded = true; player.vy = 0; } else if (player.vy < 0) { player.y = (r + 1) * TILE_SIZE; player.vy = 0; hitBlock(r, c, tile); } }
                }
            }
        }
    }
}

function hitBlock(r, c, tile) {
    if (tile.hit || tile.type === 1 || tile.type >= 10) { 
        if(tile.type === 2) { playSound('bump'); if(player.invincibleTimer > 0 || player.isBig) { tile.type = 0; spawnParticles(c * TILE_SIZE + TILE_SIZE/2, r * TILE_SIZE + TILE_SIZE/2); } } return; 
    }
    tile.bumpY = -10; setTimeout(() => { tile.bumpY = 0; }, 100);
    if (tile.type === 3) { playSound('coin'); tile.type = 9; tile.hit = true; addScore(10); spawnItem('coin', c * TILE_SIZE, r * TILE_SIZE); } 
    else if (tile.type === 4) { playSound('bump'); tile.type = 9; tile.hit = true; triggerQuiz(); } 
    else if (tile.type === 5) { playSound('powerup'); tile.type = 9; tile.hit = true; spawnItem('star', c * TILE_SIZE, r * TILE_SIZE - TILE_SIZE); } 
    else if (tile.type === 7) { playSound('powerup'); tile.type = 9; tile.hit = true; spawnItem('mushroom', c * TILE_SIZE, r * TILE_SIZE - TILE_SIZE); } 
    else if (tile.type === 2) { playSound('bump'); if(player.invincibleTimer > 0 || player.isBig) { tile.type = 0; spawnParticles(c * TILE_SIZE + TILE_SIZE/2, r * TILE_SIZE + TILE_SIZE/2); } }
}

function spawnItem(type, x, y) { items.push({ type: type, x: x + 10, y: y, vy: -8, vx: (type === 'star') ? 2 : (type === 'mushroom' ? 1.5 : 0), life: 0 }); }
function spawnFloatingText(text, x, y) { particles.push({ text: text, x: x + 10, y: y, vy: -2, life: 60 }); }
function spawnParticles(x, y, color) { for(let i=0; i<8; i++) particles.push({ color: color || '#d13a00', x: x, y: y, vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10 - 5, life: 30 }); }

function updateItemsAndParticles() {
    for (let i = items.length - 1; i >= 0; i--) {
        let it = items[i];
        if(it.type === 'coin') { it.y += it.vy; it.vy += 0.5; it.life++; if(it.life > 20) items.splice(i, 1); } 
        else if (it.type === 'star' || it.type === 'mushroom') {
            it.x += it.vx; it.y += it.vy; it.vy += GRAVITY;
            let tileY = Math.floor((it.y + 20) / TILE_SIZE), centerCol = Math.floor((it.x + 10) / TILE_SIZE);
            if(tileY < mapTiles.length && isSolid(mapTiles[tileY][centerCol]?.type)) { it.y = tileY * TILE_SIZE - 20; it.vy = (it.type === 'star') ? -6 : 0; }
            if(it.type === 'mushroom' || it.type === 'star') {
                let rightTile = Math.floor((it.x + 20) / TILE_SIZE), leftTile = Math.floor(it.x / TILE_SIZE), headY = Math.floor((it.y + 10) / TILE_SIZE);
                if (it.vx > 0 && rightTile < mapWidth && isSolid(mapTiles[headY][rightTile]?.type)) it.vx *= -1;
                else if (it.vx < 0 && leftTile >= 0 && isSolid(mapTiles[headY][leftTile]?.type)) it.vx *= -1;
            }
            if (Math.abs(player.x - it.x) < 30 && Math.abs((player.y + player.height/2) - (it.y + 10)) < (player.height/2 + 10)) { 
                if (it.type === 'star') { player.invincibleTimer = 10; playSound('powerup'); addScore(50); spawnFloatingText("KEBAL!", player.x, player.y - 20); } 
                else if (it.type === 'mushroom') { playSound('powerup'); addScore(50); lives++; updateHUD(); player.makeBig(); }
                items.splice(i, 1); 
            }
            if(it.y > mapHeight + 100) items.splice(i, 1);
        }
    }
    for (let i = particles.length - 1; i >= 0; i--) { let p = particles[i]; p.x += p.vx || 0; p.y += p.vy; p.life--; if (p.life <= 0) particles.splice(i, 1); }
}

/** GAMBAR CANVAS */
function drawBackground() {
    ctx.fillStyle = '#5c94fc'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    let deepGroundY = 14 * TILE_SIZE - camera.y; 
    if (deepGroundY < canvas.height) { ctx.fillStyle = '#000'; ctx.fillRect(0, deepGroundY, canvas.width, canvas.height - deepGroundY); }

    if(camera.y < 10 * TILE_SIZE) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        clouds.forEach(c => { let cx = (c.x - camera.x * 0.2) % (mapWidth * TILE_SIZE); if(cx < -c.size) cx += mapWidth * TILE_SIZE + c.size; let cy = c.y - camera.y * 0.1; ctx.beginPath(); ctx.arc(cx, cy, c.size, 0, Math.PI * 2); ctx.arc(cx + c.size*0.5, cy - c.size*0.3, c.size*0.8, 0, Math.PI * 2); ctx.arc(cx + c.size*1.2, cy, c.size*0.9, 0, Math.PI * 2); ctx.fill(); c.x += c.speed; });
        
        // Burung
        ctx.fillStyle = '#fff';
        birds.forEach(b => { let bx = (b.x - camera.x * 0.3) % (mapWidth * TILE_SIZE); if(bx < -20) bx += mapWidth * TILE_SIZE + 20; let by = b.y - camera.y * 0.1; ctx.beginPath(); ctx.moveTo(bx, by); ctx.quadraticCurveTo(bx+10, by-Math.abs(Math.sin(Date.now()/200+b.x))*10, bx+20, by); ctx.quadraticCurveTo(bx+10, by-Math.abs(Math.sin(Date.now()/200+b.x))*5, bx, by); ctx.fill(); b.x += b.vx; });
    }

    decorations.forEach(d => {
        let x = d.x - camera.x, y = d.y - camera.y;
        if(d.type==='tree') { ctx.fillStyle = '#5d4037'; ctx.fillRect(x + 15, y - 40, 10, 40); ctx.fillStyle = '#2e7d32'; ctx.beginPath(); ctx.arc(x + 20, y - 50, 25, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x + 5, y - 40, 20, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x + 35, y - 40, 20, 0, Math.PI*2); ctx.fill(); } 
        else { y += TILE_SIZE; ctx.fillStyle = '#388e3c'; ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + 5, y - 10); ctx.lineTo(x + 10, y); ctx.moveTo(x + 8, y); ctx.lineTo(x + 15, y - 15); ctx.lineTo(x + 22, y); ctx.moveTo(x + 20, y); ctx.lineTo(x + 25, y - 8); ctx.lineTo(x + 30, y); ctx.fill(); }
    });

    // Gambar Landak (Enemies)
    enemies.forEach(en => {
        if(!en.dead || en.deadTimer>0) {
            let cx = en.x - camera.x + en.width / 2, cy = en.y - camera.y + en.height;
            ctx.save(); ctx.translate(cx, cy); if (en.vx > 0) ctx.scale(-1, 1);
            // Badan Landak
            ctx.fillStyle = '#3e2723'; ctx.beginPath(); ctx.arc(0, -10, 14, Math.PI, 0); ctx.fill();
            // Duri Landak
            ctx.fillStyle = '#5d4037'; ctx.beginPath(); for(let i=-12; i<=12; i+=6) { ctx.moveTo(i, -10); ctx.lineTo(i-4, -22); ctx.lineTo(i+4, -10); } ctx.fill();
            // Mata & Hidung
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-8, -12, 3, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-9, -12, 1.5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(-14, -8, 2, 0, Math.PI*2); ctx.fill(); 
            // Kaki Berjalan
            let footOffset = Math.sin(Date.now() / 100) * 4; ctx.beginPath(); ctx.arc(-6 + footOffset, -2, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(6 - footOffset, -2, 3, 0, Math.PI*2); ctx.fill(); ctx.restore();
        }
    });
}

function drawForeground() {
    for (let r = 0; r < mapTiles.length; r++) {
        for (let c = 0; c < mapWidth; c++) {
            let tile = mapTiles[r][c]; if (tile.type === 0) continue;
            let x = c * TILE_SIZE - camera.x, y = r * TILE_SIZE + tile.bumpY - camera.y;
            if (x < -TILE_SIZE || x > canvas.width + TILE_SIZE || y < -TILE_SIZE || y > canvas.height + TILE_SIZE) continue;

            if (tile.type === 1) { 
                let isUnderground = r > 15;
                ctx.fillStyle = isUnderground ? '#004d40' : '#4caf50'; ctx.fillRect(x, y, TILE_SIZE, 8); ctx.fillStyle = isUnderground ? '#3e2723' : '#8d6e63'; ctx.fillRect(x, y + 8, TILE_SIZE, TILE_SIZE - 8); ctx.fillStyle = isUnderground ? '#1b0000' : '#5d4037'; ctx.fillRect(x + 5, y + 15, 5, 5); ctx.fillRect(x + 25, y + 25, 5, 5);
            } else if (tile.type === 2) { 
                ctx.fillStyle = '#d13a00'; ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(x, y + TILE_SIZE/2); ctx.lineTo(x + TILE_SIZE, y + TILE_SIZE/2); ctx.moveTo(x + TILE_SIZE/2, y); ctx.lineTo(x + TILE_SIZE/2, y + TILE_SIZE/2); ctx.stroke(); ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
            } else if (tile.type >= 3 && tile.type <= 7) { 
                ctx.fillStyle = (Math.floor(Date.now() / 200) % 2 === 0) ? '#fbd000' : '#e6a100'; ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE); ctx.fillStyle = '#000'; ctx.font = "bold 24px 'Fredoka One'"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("?", x + TILE_SIZE/2, y + TILE_SIZE/2); ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
            } else if (tile.type === 9) { 
                ctx.fillStyle = '#795548'; ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE); ctx.strokeStyle = '#3e2723'; ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE); ctx.fillStyle = '#3e2723'; ctx.fillRect(x+4,y+4,3,3); ctx.fillRect(x+TILE_SIZE-7,y+4,3,3); ctx.fillRect(x+4,y+TILE_SIZE-7,3,3); ctx.fillRect(x+TILE_SIZE-7,y+TILE_SIZE-7,3,3);
            } else if (tile.type === 10 || tile.type === 13 || tile.type === 14 || tile.type === 15) { 
                ctx.fillStyle = '#4caf50'; ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE); ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE); ctx.fillStyle = '#81c784'; ctx.fillRect(x + TILE_SIZE - 12, y + 2, 8, TILE_SIZE - 4);
                if(tile.type === 15) { ctx.fillStyle='#fff'; ctx.fillRect(x+10, y+15, 20, 10); ctx.fillStyle='#e52521'; ctx.fillRect(x+19, y+15, 2, 10); } 
            } else if (tile.type === 11 || tile.type === 16) { 
                ctx.fillStyle = '#4caf50'; ctx.fillRect(x + 2, y, TILE_SIZE - 4, TILE_SIZE); ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(x+2, y); ctx.lineTo(x+2, y+TILE_SIZE); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x+TILE_SIZE-2, y); ctx.lineTo(x+TILE_SIZE-2, y+TILE_SIZE); ctx.stroke(); ctx.fillStyle = '#81c784'; ctx.fillRect(x + TILE_SIZE - 10, y, 6, TILE_SIZE);
            } else if (tile.type === 6) { 
                ctx.fillStyle = '#fff'; ctx.fillRect(x + TILE_SIZE/2 - 4, y, 8, TILE_SIZE); ctx.fillStyle = '#fbd000'; if(r === 9) { ctx.beginPath(); ctx.arc(x + TILE_SIZE/2, y, 10, 0, Math.PI*2); ctx.fill(); if(assets.flag.complete) ctx.drawImage(assets.flag, x + TILE_SIZE/2, y, 40, 40); }
            }
        }
    }

    items.forEach(it => {
        let x = it.x - camera.x, y = it.y - camera.y;
        if(it.type === 'coin') { ctx.fillStyle = '#fbd000'; ctx.beginPath(); ctx.ellipse(x + 10, y + 10, Math.abs(Math.sin(it.life * 0.2)) * 10, 12, 0, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = '#fff'; ctx.stroke(); } 
        else if (it.type === 'star') { ctx.fillStyle = (Math.floor(Date.now() / 100) % 2 === 0) ? '#fbd000' : '#fff'; ctx.beginPath(); ctx.arc(x+10, y+10, 12, 0, Math.PI*2); ctx.fill(); } 
        else if (it.type === 'mushroom') { ctx.fillStyle = '#e52521'; ctx.beginPath(); ctx.arc(x+10, y+10, 10, Math.PI, 0); ctx.fill(); ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(x+5, y+5, 3, 0, Math.PI*2); ctx.fill(); ctx.arc(x+15, y+5, 3, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#fce4ec'; ctx.fillRect(x+6, y+10, 8, 8); ctx.fillStyle = '#000'; ctx.fillRect(x+8, y+12, 1, 3); ctx.fillRect(x+11, y+12, 1, 3); }
    });

    particles.forEach(p => {
        if (p.text) { ctx.fillStyle = '#fff'; ctx.font = "bold 20px 'Fredoka One'"; ctx.textAlign = "center"; ctx.strokeStyle = '#000'; ctx.lineWidth = 3; ctx.strokeText(p.text, p.x - camera.x, p.y - camera.y); ctx.fillText(p.text, p.x - camera.x, p.y - camera.y); } 
        else { ctx.fillStyle = p.color || '#fff'; ctx.fillRect(p.x - camera.x, p.y - camera.y, 6, 6); }
    });
}

function gameLoop() {
    if (gameState === 'playing' || gameState === 'pipe_transition') {
        if (gameState === 'playing') { player.update(); updateEnemies(); } else { updatePipeTransition(); }
        updateItemsAndParticles(); ctx.clearRect(0, 0, canvas.width, canvas.height); drawBackground(); 
        if (gameState !== 'gameover') player.draw(ctx); drawForeground();
    } else if (['paused', 'library', 'gameover', 'win'].includes(gameState)) {
        ctx.clearRect(0, 0, canvas.width, canvas.height); drawBackground(); if(gameState !== 'gameover') player.draw(ctx); drawForeground();
    }
    requestID = requestAnimationFrame(gameLoop);
}

let currentQuesIdx = 0;
function triggerQuiz() {
    gameState = 'paused'; stopBGM(); keys.left = false; keys.right = false; keys.jump = false; keys.down = false;
    document.getElementById('qz-lvl-text').innerText = currentLevel; 
    const area = document.getElementById('quiz-interactive-area'); area.innerHTML = '';
    const submitBtn = document.getElementById('quiz-submit-btn'); submitBtn.classList.add('hidden');
    submitBtn.onclick = null;

    let qList = quizzes[currentLevel];
    if(!qList || qList.length === 0) { finishQuizEvaluation(true); return; } // Fallback
    currentQuesIdx = Math.floor(Math.random() * qList.length);
    let qData = qList[currentQuesIdx];

    if (currentLevel === 1) {
        document.getElementById('quiz-question').innerText = qData.q;
        qData.opts.forEach((optText, i) => { const btn = document.createElement('button'); btn.className = 'q-btn'; btn.innerText = optText; btn.onclick = () => finishQuizEvaluation(i === qData.ans); area.appendChild(btn); });
    } 
    else if (currentLevel === 2) {
        document.getElementById('quiz-question').innerText = "Susunlah kata-kata berikut menjadi kalimat yang benar:";
        let ansArea = document.createElement('div'); ansArea.className = 'answer-area'; area.appendChild(ansArea);
        let bank = document.createElement('div'); bank.className = 'word-bank'; area.appendChild(bank);
        
        let shuffled = [...qData.words].sort(()=>Math.random()-0.5);
        shuffled.forEach(w => {
            let chip = document.createElement('span'); chip.className = 'word-chip'; chip.innerText = w;
            chip.onclick = function() {
                if(this.parentElement === bank) { ansArea.appendChild(this); } else { bank.appendChild(this); }
            };
            bank.appendChild(chip);
        });

        submitBtn.classList.remove('hidden');
        submitBtn.onclick = () => {
            let userAns = Array.from(ansArea.children).map(c=>c.innerText).join(' ');
            // Pengecekan longgar untuk susunan kata yang masih masuk akal (mengingat struktur bahasa indonesia)
            let isCorrect = userAns === qData.correct || (ansArea.children.length === qData.words.length); // Asumsi sederhana: jika sudah disusun semua, anggap benar untuk mempermudah gameplay, atau ketat
            finishQuizEvaluation(userAns === qData.correct); 
        };
    } 
    else if (currentLevel === 3) {
        document.getElementById('quiz-question').innerText = "Pilih jawaban yang tepat untuk mengisi bagian yang kosong.";
        let qText = document.createElement('p'); qText.style.fontSize = "18px";
        let parts = qData.text.split("_____");
        
        let blankSpan = document.createElement('span'); blankSpan.className = 'blank-slot'; blankSpan.innerText = " [ ? ] ";
        blankSpan.onclick = function() { this.innerText = " [ ? ] "; this.dataset.val = ""; }; // Reset

        qText.appendChild(document.createTextNode(parts[0]));
        qText.appendChild(blankSpan);
        if(parts[1]) qText.appendChild(document.createTextNode(parts[1]));
        area.appendChild(qText);

        let bank = document.createElement('div'); bank.className = 'word-bank'; area.appendChild(bank);
        [...wordBankLvl3].sort(()=>Math.random()-0.5).forEach(w => {
            let chip = document.createElement('span'); chip.className = 'word-chip'; chip.innerText = w;
            chip.onclick = function() { blankSpan.innerText = w; blankSpan.dataset.val = w; };
            bank.appendChild(chip);
        });

        submitBtn.classList.remove('hidden');
        submitBtn.onclick = () => { finishQuizEvaluation(blankSpan.dataset.val === qData.ans); };
    }
    document.getElementById('quiz-modal').classList.remove('hidden');
}

function finishQuizEvaluation(isCorrect) {
    document.getElementById('quiz-modal').classList.add('hidden');
    if (isCorrect) { playSound('coin'); addScore(100); spawnFloatingText("BENAR!", player.x, player.y - 20); } 
    else { spawnFloatingText("SALAH!", player.x, player.y - 20); handleDeath(true); }
    if (gameState !== 'gameover') { gameState = 'playing'; startBGM(); }
}

function handleDeath(fromQuiz = false) {
    playSound('dead'); lives--; updateHUD(); stopBGM(); player.isBig = false; player.originalHeight = 48; player.height = 48;
    if (lives <= 0) {
        submitScoreToGAS();
        gameState = 'gameover'; document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden')); document.getElementById('message-overlay').classList.remove('hidden'); document.getElementById('message-text').innerText = "GAME OVER";
        document.getElementById('msg-btn').onclick = () => { document.getElementById('message-overlay').classList.add('hidden'); document.getElementById('main-menu').classList.remove('hidden'); };
    } else if (!fromQuiz) { gameState = 'paused'; setTimeout(() => { player.reset(); gameState = 'playing'; startBGM(); }, 1000); }
}

function handleLevelComplete() {
    playSound('powerup'); stopBGM();
    if(currentLevel < 3) {
        gameState = 'paused';
        setTimeout(() => { currentLevel++; initLevel(); gameState = 'playing'; startBGM(); }, 2000);
    } else {
        submitScoreToGAS();
        gameState = 'win'; document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden')); document.getElementById('message-overlay').classList.remove('hidden'); document.getElementById('message-text').innerText = "Selamat Anda Tamat!"; 
        document.getElementById('msg-btn').onclick = () => { document.getElementById('message-overlay').classList.add('hidden'); document.getElementById('main-menu').classList.remove('hidden'); };
    }

/** BACKEND GOOGLE APPS SCRIPT */
function submitScoreToGAS() {
    if(score <= 0) return;
    let formData = new URLSearchParams();
    formData.append('name', currentPlayer.name);
    formData.append('school', currentPlayer.school);
    formData.append('score', score);
    fetch(GAS_URL, { method: 'POST', body: formData, mode: 'no-cors' }).catch(e => console.error(e));
}

function loadLeaderboard() {
    document.getElementById('lb-content').innerHTML = '<div class="loading-text">Memuat data dari server...</div>';
    fetch(GAS_URL + "?action=getScores")
    .then(res => res.json())
    .then(data => {
        let html = 'https://script.google.com/macros/s/AKfycbweBUj24ZH6syZAf83BoKrzHMQ6-jUFrIVuzxs23mgx4rn3VOoRUzYvwe8MHcKBoNhF/exec';
        if(data && data.length > 0) {
            data.sort((a,b)=>b.score-a.score).slice(0, 10).forEach((item, idx) => {
                html += `<div class="lb-item"><div class="lb-rank">#${idx+1}</div><div class="lb-name">${item.name}<span class="lb-school">${item.school}</span></div><div class="lb-pts">${item.score}</div></div>`;
            });
        } else { html = '<div class="loading-text">Belum ada skor tercatat.</div>'; }
        document.getElementById('lb-content').innerHTML = html;
    })
    .catch(err => { document.getElementById('lb-content').innerHTML = '<div class="loading-text">Gagal memuat data.</div>'; });
}

    else { document.getElementById('login-error').style.display = "none"; currentPlayer.name = inputName; currentPlayer.school = inputSchool; document.getElementById('welcome-name').innerText = currentPlayer.name; document.getElementById('login-menu').classList.add('hidden'); document.getElementById('main-menu').classList.remove('hidden'); }
});

document.getElementById('start-btn').addEventListener('click', () => { initAudio(); score = 0; lives = 3; currentLevel = 1; updateHUD(); initLevel(); document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden')); document.getElementById('hud').classList.remove('hidden'); document.getElementById('touch-controls').classList.remove('hidden'); gameState = 'playing'; startBGM(); if (!requestID) requestAnimationFrame(gameLoop); });
document.getElementById('menu-btn').addEventListener('click', () => { gameState = 'menu'; stopBGM(); document.getElementById('hud').classList.add('hidden'); document.getElementById('touch-controls').classList.add('hidden'); document.getElementById('main-menu').classList.remove('hidden'); });
document.getElementById('leaderboard-btn').addEventListener('click', () => { document.getElementById('main-menu').classList.add('hidden'); document.getElementById('leaderboard-menu').classList.remove('hidden'); loadLeaderboard(); });
document.getElementById('close-lb-btn').addEventListener('click', () => { document.getElementById('leaderboard-menu').classList.add('hidden'); document.getElementById('main-menu').classList.remove('hidden'); });

// Tombol Fullscreen Logic
const fullscreenBtn = document.getElementById('fullscreen-btn');
fullscreenBtn.addEventListener('click', function() {
    let elem = document.documentElement;
    if (!document.fullscreenElement && !document.mozFullScreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
        if (elem.requestFullscreen) { elem.requestFullscreen(); }
        else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }
        else if (elem.mozRequestFullScreen) { elem.mozRequestFullScreen(); }
        else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(Element.ALLOW_KEYBOARD_INPUT); }
    } else {
        if (document.exitFullscreen) { document.exitFullscreen(); }
        else if (document.msExitFullscreen) { document.msExitFullscreen(); }
        else if (document.mozCancelFullScreen) { document.mozCancelFullScreen(); }
        else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
    }
});

// Listener agar tombol berubah saat Esc ditekan
function updateFullscreenButton() {
    if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement && !document.msFullscreenElement) {
        fullscreenBtn.innerText = '⛶';
    } else {
        fullscreenBtn.innerText = '🔳';
    }
}
document.addEventListener('fullscreenchange', updateFullscreenButton);
document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
document.addEventListener('mozfullscreenchange', updateFullscreenButton);
document.addEventListener('MSFullscreenChange', updateFullscreenButton);

window.addEventListener('keydown', (e) => { if (gameState !== 'playing') return; if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true; if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true; if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.jump = true; if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = true; });
window.addEventListener('keyup', (e) => { if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false; if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false; if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.jump = false; if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = false; });
const bindTouch = (id, keyName) => { const el = document.getElementById(id); el.addEventListener('touchstart', (e) => { e.preventDefault(); if(gameState === 'playing') { keys[keyName] = true; el.classList.add('active'); } }, {passive: false}); el.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyName] = false; el.classList.remove('active'); }); };
bindTouch('t-left', 'left'); bindTouch('t-right', 'right'); bindTouch('t-jump', 'jump'); bindTouch('t-down', 'down');
</script>
